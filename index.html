<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CenoCup - Legends v30.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #050508;
            --card-glass: rgba(18, 18, 25, 0.98);
            --neon: #00ff87;
            --gold: #ffcc00;
            --silver: #cbd5e0;
            --bronze: #cd7f32;
            --danger: #ff3e3e;
            --blue: #00d4ff;
            --text-main: #ffffff;
            --text-dim: #9494a3;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050508 100%);
            color: var(--text-main); font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1300px; }
        header { text-align: center; padding: 25px 0; cursor: pointer; }
        header h1 { font-family: 'Orbitron'; font-size: 2rem; letter-spacing: 4px; margin: 0; text-transform: uppercase; }
        header h1 span { color: var(--neon); text-shadow: 0 0 15px rgba(0,255,135,0.3); }

        /* TABS */
        .tabs { display: flex; gap: 5px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(255,255,255,0.03); color: var(--text-dim);
            padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; font-family: 'Orbitron'; font-size: 0.6rem; transition: 0.3s;
        }
        .tab-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); border-color: var(--neon); }

        /* TABELAS */
        .table-wrapper { background: var(--card-glass); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { padding: 12px; color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); font-family: 'Orbitron'; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); text-align: center; }

        /* DESEMPENHO CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-glass); border-radius: 15px; padding: 25px; text-align: center; border-bottom: 3px solid var(--blue); position: relative; overflow: hidden; }
        .stat-card img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #333; margin-bottom: 10px; }
        .stat-card.best-atk { border-color: var(--neon); }
        .stat-card.worst-def { border-color: var(--danger); }
        .stat-label { font-size: 0.6rem; font-family: 'Orbitron'; color: var(--text-dim); letter-spacing: 1px; }
        .stat-value { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--text-main); margin: 5px 0; }

        /* TRAJETÓRIA BADGE */
        .badge-traj { font-size: 0.55rem; background: rgba(0,212,255,0.1); color: var(--blue); padding: 3px 7px; border-radius: 4px; margin: 2px; display: inline-block; border: 1px solid rgba(0,212,255,0.2); font-family: 'Orbitron'; }

        /* ADMIN */
        #admin { display: none; background: #0a0a0c; padding: 20px; border-radius: 15px; border: 2px solid var(--neon); margin-bottom: 20px; }
        .edit-row { display: flex; gap: 5px; margin-bottom: 8px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 8px; flex-wrap: wrap; align-items: center; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 5px; font-family: 'Rajdhani'; }

    </style>
</head>
<body>

<div class="container">
    <header onclick="openAdmin()">
        <h1>CenoCup <span>- Legends</span></h1>
        <div style="font-family:'Orbitron'; font-size:0.55rem; color:var(--text-dim); letter-spacing:4px;">ULTIMATE PERFORMANCE ENGINE</div>
    </header>

    <div id="admin">
        <h3 style="color:var(--neon); font-family:'Orbitron'; font-size:0.8rem;">PAINEL DE CONTROLO</h3>
        <select id="admin-selector" onchange="renderEditor()" style="width:100%; margin-bottom:15px;"></select>
        <div id="editor-container"></div>
        <button onclick="addNewPlayer()" style="width:100%; margin-top:10px; background:transparent; border:1px solid var(--neon); color:var(--neon); padding:12px; cursor:pointer; font-family:'Orbitron'; font-size:0.7rem;">+ ADICIONAR NOVA LENDA</button>
        <button onclick="saveAll()" style="width:100%; margin-top:5px; background:var(--neon); border:none; padding:12px; font-weight:bold; cursor:pointer; font-family:'Orbitron'; font-size:0.7rem;">GRAVAR ALTERAÇÕES</button>
        <button onclick="closeSeason()" style="width:100%; margin-top:5px; background:var(--danger); color:white; border:none; padding:12px; cursor:pointer; font-family:'Orbitron'; font-size:0.7rem;">CONCLUIR ÉPOCA ATUAL</button>
        <div style="margin-top:10px; display:flex; gap:10px;">
            <button onclick="exportDB()" style="flex:1; background:#222; color:#fff; border:none; padding:10px; cursor:pointer; font-size:0.7rem;">💾 EXPORTAR</button>
            <button onclick="importDB()" style="flex:1; background:#222; color:#fff; border:none; padding:10px; cursor:pointer; font-size:0.7rem;">📂 IMPORTAR</button>
        </div>
    </div>

    <div class="tabs">
        <button id="t-tab" class="tab-btn active" onclick="switchTab('tabela')">🏆 Época</button>
        <button id="r-tab" class="tab-btn" onclick="switchTab('ranking')">👑 Ranking Geral</button>
        <button id="d-tab" class="tab-btn" onclick="switchTab('desempenho')">📊 Desempenho</button>
        <button id="g-tab" class="tab-btn" onclick="switchTab('galeria')">🏛️ Hall da Fama</button>
        <button id="i-tab" class="tab-btn" onclick="switchTab('insights')">🧬 DNA</button>
    </div>

    <div id="view-tabela">
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:15px;">
            <span style="font-family:'Orbitron'; font-size:0.7rem; color:var(--text-dim);">FILTRAR TEMPORADA:</span>
            <select id="season-view-selector" onchange="changeSeasonView(this.value)" style="flex:1; padding:10px; background:rgba(255,255,255,0.05); color:white; border:1px solid #333; border-radius:8px;"></select>
        </div>
        <div class="table-wrapper"><table id="table-main"></table></div>
    </div>

    <div id="view-ranking" style="display:none">
        <div class="table-wrapper"><table id="table-ranking"></table></div>
    </div>

    <div id="view-desempenho" style="display:none">
        <div class="stats-grid" id="stats-content"></div>
    </div>

    <div id="view-galeria" style="display:none; flex-direction:column;"></div>

    <div id="view-insights" style="display:none">
        <div id="insights-content" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px;"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'cenocup_legends_v305';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { atual: [], historico: [] };
    let currentSeasonView = 'atual';

    function openAdmin() { if(prompt("Acesso:") === '123') document.getElementById('admin').style.display='block'; }

    function switchTab(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        ['view-tabela', 'view-ranking', 'view-desempenho', 'view-galeria', 'view-insights'].forEach(v => document.getElementById(v).style.display = 'none');
        document.getElementById('view-' + mode).style.display = (mode === 'galeria') ? 'flex' : 'block';
        document.getElementById(mode.charAt(0)+'-tab').classList.add('active');
        if(mode === 'tabela') renderTable();
        if(mode === 'ranking') renderRankingGeral();
        if(mode === 'desempenho') renderDesempenho();
        if(mode === 'galeria') renderGallery();
        if(mode === 'insights') renderInsights();
    }

    function calcForca(gp, gc) { return parseFloat(((gp * 3.5) - (gc * 2.5)).toFixed(1)); }

    // RENDERIZA A ÉPOCA SELECIONADA
    function renderTable() {
        const sel = document.getElementById('season-view-selector');
        sel.innerHTML = '<option value="atual">🎮 TEMPORADA ATUAL</option>';
        db.historico.forEach((h, i) => sel.innerHTML += `<option value="${i}">📂 ${h.nome}</option>`);
        sel.value = currentSeasonView;

        let list = currentSeasonView === 'atual' ? [...db.atual] : [...db.historico[currentSeasonView].dados];
        list.sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc));

        document.getElementById('table-main').innerHTML = `<thead><tr><th>POS</th><th style="text-align:left">LENDA</th><th>J</th><th>PTS</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GS</th><th>SG</th><th>FORÇA</th></tr></thead>
        <tbody>${list.map((j, i) => `<tr>
            <td style="font-family:'Orbitron'; font-weight:bold;">${i+1}º</td>
            <td style="text-align:left"><b>${j.tecnico}</b></td>
            <td>${j.v+j.e+(j.d||0)}</td>
            <td style="color:var(--neon); font-weight:bold;">${(j.v*3)+j.e}</td>
            <td>${j.v}</td><td>${j.e}</td><td>${j.d||0}</td><td>${j.gp}</td><td>${j.gc}</td><td>${j.gp-j.gc}</td>
            <td style="color:var(--gold)">${calcForca(j.gp, j.gc)}</td>
        </tr>`).join('')}</tbody>`;
    }

    function changeSeasonView(val) { currentSeasonView = val; renderTable(); }

    // RANKING GERAL COM PARTICIPAÇÕES
    function renderRankingGeral() {
        let stats = {};
        const process = (lista, seasonName) => {
            lista.forEach((j, idx) => {
                if(!stats[j.tecnico]) stats[j.tecnico] = { t:j.tecnico, pts:0, f:0, j:0, traj:[] };
                let s = stats[j.tecnico];
                s.pts += (j.v*3)+j.e; s.f += calcForca(j.gp, j.gc); s.j += (j.v+j.e+(j.d||0));
                s.traj.push(`${seasonName}: ${idx+1}º`);
            });
        };
        db.historico.forEach(h => process(h.dados, h.nome));
        process(db.atual, "Atu");

        let sorted = Object.values(stats).sort((a,b) => b.pts - a.pts || b.f - a.f);

        document.getElementById('table-ranking').innerHTML = `<thead><tr><th>RANK</th><th style="text-align:left">LENDA</th><th>PONTOS</th><th>FORÇA TOTAL</th><th>JOGOS</th><th style="text-align:left">TRAJETÓRIA (PARTICIPAÇÕES)</th></tr></thead>
        <tbody>${sorted.map((j, i) => `<tr>
            <td style="font-family:'Orbitron'; color:var(--neon); font-size:1.1rem;">${i+1}º</td>
            <td style="text-align:left"><b>${j.t}</b></td>
            <td style="font-weight:bold;">${j.pts}</td><td style="color:var(--gold)">${j.f.toFixed(1)}</td><td>${j.j}</td>
            <td style="text-align:left">${j.traj.map(t => `<span class="badge-traj">${t}</span>`).join('')}</td>
        </tr>`).join('')}</tbody>`;
    }

    // ABA DESEMPENHO (MÉDIAS)
    function renderDesempenho() {
        let all = [...db.historico.flatMap(h => h.dados), ...db.atual];
        let map = {};
        all.forEach(j => {
            if(!map[j.tecnico]) map[j.tecnico] = { t:j.tecnico, gp:0, gc:0, e:0, j:0, foto:j.foto };
            map[j.tecnico].gp += j.gp; map[j.tecnico].gc += j.gc; map[j.tecnico].e += j.e; map[j.tecnico].j += (j.v+j.e+(j.d||0));
        });
        let arr = Object.values(map).filter(x => x.j > 0);
        if(!arr.length) return;

        let mAtk = [...arr].sort((a,b) => (b.gp/b.j) - (a.gp/a.j))[0];
        let mDef = [...arr].sort((a,b) => (a.gc/a.j) - (b.gc/b.j))[0];
        let pDef = [...arr].sort((a,b) => (b.gc/b.j) - (a.gc/a.j))[0];
        let mEmp = [...arr].sort((a,b) => b.e - a.e)[0];

        const card = (title, user, val, type, unit) => `
            <div class="stat-card ${type}">
                <div class="stat-label">${title}</div>
                <img src="${user.foto}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/166/166120.png'">
                <div class="stat-value">${user.t}</div>
                <small style="color:var(--text-dim)">${val} ${unit}</small>
            </div>`;

        document.getElementById('stats-content').innerHTML = 
            card("MELHOR ATAQUE", mAtk, (mAtk.gp/mAtk.j).toFixed(2), "best-atk", "Gols/Jogo") +
            card("MELHOR DEFESA", mDef, (mDef.gc/mDef.j).toFixed(2), "best-def", "Gols/Jogo") +
            card("PIOR DEFESA", pDef, (pDef.gc/pDef.j).toFixed(2), "worst-def", "Gols/Jogo") +
            card("MAIOR EMPATADOR", mEmp, mEmp.e, "", "Empates Totais");
    }

    function renderGallery() {
        const gal = document.getElementById('view-galeria');
        if(!db.historico.length) { gal.innerHTML = "<p style='text-align:center; padding:40px;'>Nenhuma história escrita ainda...</p>"; return; }
        gal.innerHTML = db.historico.slice().reverse().map(h => `
            <div class="table-wrapper">
                <div style="font-family:'Orbitron'; color:var(--neon); border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:15px;">ÉPOCA: ${h.nome.toUpperCase()}</div>
                <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; text-align:center;">
                    <div><img src="${h.dados[0].foto}" style="width:45px; height:45px; border-radius:50%; border:2px solid var(--gold);" onerror="this.src='https://cdn-icons-png.flaticon.com/512/166/166120.png'"><br><small>🥇 ${h.dados[0].tecnico}</small></div>
                    <div><small>🥈 ${h.dados[1]?h.dados[1].tecnico:'-'}</small></div>
                    <div><small>🥉 ${h.dados[2]?h.dados[2].tecnico:'-'}</small></div>
                    <div><img src="${h.dados[h.dados.length-1].foto}" style="width:45px; height:45px; border-radius:50%; border:2px solid var(--danger);" onerror="this.src='https://cdn-icons-png.flaticon.com/512/166/166120.png'"><br><small>💩 ${h.dados[h.dados.length-1].tecnico}</small></div>
                </div>
            </div>`).join('');
    }

    function renderInsights() {
        let map = {};
        [...db.historico.flatMap(h => h.dados), ...db.atual].forEach(j => {
            if(!map[j.tecnico]) map[j.tecnico] = { t:j.tecnico, gp:0, gc:0, j:0, f:0, foto:j.foto };
            map[j.tecnico].gp += j.gp; map[j.tecnico].gc += j.gc; map[j.tecnico].j += (j.v+j.e+(j.d||0));
            map[j.tecnico].f += calcForca(j.gp, j.gc);
        });
        let stats = Object.values(map);
        document.getElementById('insights-content').innerHTML = stats.map(s => {
            let rival = stats.filter(r => r.t !== s.t).sort((a,b) => Math.abs(a.f - s.f) - Math.abs(b.f - s.f))[0];
            return `<div class="table-wrapper" style="text-align:center">
                <img src="${s.foto}" style="width:60px; height:60px; border-radius:50%; border:2px solid var(--blue);" onerror="this.src='https://cdn-icons-png.flaticon.com/512/166/166120.png'">
                <h3 style="font-family:'Orbitron'; margin:10px 0;">${s.t}</h3>
                <div style="background:rgba(0,212,255,0.05); padding:10px; border-radius:10px; border:1px dashed var(--blue);">
                    <small style="color:var(--blue)">RIVAL DE DESEMPENHO:</small><br><b>${rival ? rival.t : 'Pinnacle Solo'}</b>
                </div>
            </div>`;
        }).join('');
    }

    // ADMIN CORE
    function renderEditor() {
        const m = document.getElementById('admin-selector').value;
        const target = m === 'atual' ? db.atual : db.historico[m].dados;
        document.getElementById('editor-container').innerHTML = target.map((j, i) => `
            <div class="edit-row">
                <input style="width:100px" type="text" value="${j.tecnico}" onchange="upd('${m}',${i},'tecnico',this.value)">
                V<input type="number" style="width:35px" value="${j.v}" onchange="upd('${m}',${i},'v',parseInt(this.value))">
                E<input type="number" style="width:35px" value="${j.e}" onchange="upd('${m}',${i},'e',parseInt(this.value))">
                D<input type="number" style="width:35px" value="${j.d||0}" onchange="upd('${m}',${i},'d',parseInt(this.value))">
                GP<input type="number" style="width:35px" value="${j.gp}" onchange="upd('${m}',${i},'gp',parseInt(this.value))">
                GS<input type="number" style="width:35px" value="${j.gc}" onchange="upd('${m}',${i},'gc',parseInt(this.value))">
                <input style="flex:1; min-width:120px;" type="text" value="${j.foto||''}" placeholder="Link da Foto" onchange="upd('${m}',${i},'foto',this.value)">
                <button onclick="db.atual.splice(${i},1);renderEditor()" style="color:var(--danger); border:none; background:none; cursor:pointer; font-weight:bold;">✕</button>
            </div>`).join('');
    }
    function upd(m, idx, f, v) { if(m==='atual') db.atual[idx][f]=v; else db.historico[m].dados[idx][f]=v; }
    function saveAll() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); alert("SISTEMA SINCRONIZADO!"); location.reload(); }
    function addNewPlayer() { db.atual.push({tecnico:"Lenda Nova", v:0, e:0, d:0, gp:0, gc:0, foto:""}); renderEditor(); }
    function exportDB() { 
        const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); 
        a.download = "cenocup_legends_v305.json"; a.click(); 
    }
    function importDB() {
        const inp = document.createElement('input'); inp.type = 'file';
        inp.onchange = e => {
            const r = new FileReader(); r.readAsText(e.target.files[0]);
            r.onload = ev => { db = JSON.parse(ev.target.result); saveAll(); };
        }; inp.click();
    }
    function closeSeason() {
        let n = prompt("Título da Temporada (ex: Season 1):");
        if(n && db.atual.length) {
            db.atual.sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e));
            db.historico.push({ nome: n, dados: JSON.parse(JSON.stringify(db.atual)) });
            db.atual = db.atual.map(j => ({...j, v:0, e:0, d:0, gp:0, gc:0}));
            saveAll();
        }
    }

    const adminSel = document.getElementById('admin-selector');
    adminSel.innerHTML = '<option value="atual">Temporada Atual</option>';
    db.historico.forEach((h, i) => adminSel.innerHTML += `<option value="${i}">${h.nome}</option>`);

    renderTable();
</script>
</body>
</html>
